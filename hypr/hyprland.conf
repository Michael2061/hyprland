################################################################################
# 🚀 MICHAEL'S ULTIMATE HYPRLAND CONFIG (ROSIE EDITION + ARTSY VISUALS)
################################################################################

# WICHTIG: Pfad zu den Pywal Farben
source = ~/.cache/wal/colors-hyprland.conf

#############################
### PROGRAMME & VARIABLEN ###
#############################
$mainMod = SUPER
$terminal = kitty
$browser = firefox
$fileManager = thunar
$editor = code
$notes = obsidian
# FIX: Pfad zum Rofi-Theme korrigiert
$menu = rofi -show drun

#################
### AUTOSTART ###
#################
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP HYPRLAND_INSTANCE_SIGNATURE
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = systemctl --user restart xdg-desktop-portal-hyprland
exec-once = udiskie &

# FIX: Pfad zum Script korrigiert (Es liegt jetzt im hypr/scripts Ordner!)
exec-once = ~/.config/hypr/scripts/wallpaper_engine.sh &

exec-once = dunst
exec-once = swayosd-server
exec-once = swww-daemon
exec-once = pyprland
exec-once = wl-paste --type text --watch cliphist store
exec-once = hypridle

# Waybar Autostart (Falls sie nicht im wallpaper_engine.sh gestartet wird)
exec-once = waybar

################
### MONITORS ###
################
# Deine Triple-Monitor Konfiguration ist perfekt übernommen
monitor = DP-1, 3440x1440@180, 0x0, 1
monitor = DP-2, 3440x1440@144, 3440x0, 1
monitor = DP-3, 3440x1440@180, 6880x0, 1
monitor = eDP-1, preferred, auto, 1

workspace = 1, monitor:DP-1
workspace = 4, monitor:DP-2, default:true
workspace = 7, monitor:DP-3

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2

    # ROSIE COLORS: Nutzt jetzt die echten Pywal Farben $color1 und $color2
    col.active_border = $color1 $color2 45deg
    col.inactive_border = rgba(595959aa)

    layout = master

    resize_on_border = true
    extend_border_grab_area = 20
    hover_icon_on_border = true
}

decoration {
    rounding = 15

    # ARTSY UPGRADE: Glas-Effekt
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 10
        passes = 4
        new_optimizations = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        # Nutzt $color1 (Pink/Rot von Rosie) für das Leuchten
        color = $color1
    }
}

animations {
    enabled = true
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    animation = windows, 1, 5, overshot, slide
    animation = workspaces, 1, 6, default, slide
    animation = fade, 1, 7, default
}

#############
### INPUT ###
#############
input {
    kb_layout = de
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

##############################
### WINDOW RULES (OPTIMIERT) ###
##############################

# Floating Rules
windowrulev2 = float, class:(pavucontrol|blueman-manager)
windowrulev2 = float, title:(Open File|Speichern unter)
windowrulev2 = center, title:(Open File|Speichern unter)

# Kitty: Opazität Fix
windowrulev2 = opacity 1.0 0.8 0.9, class:(kitty)

# Globaler Glassy Look
windowrulev2 = opacity 0.95 0.85, class:(.*)

###################
### KEYBINDINGS ###
###################
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, C, exec, $editor
bind = $mainMod, O, exec, $notes

# CLIPBOARD: Nutzt das Rosie Rofi-Theme
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# System-Funktionen
bind = $mainMod, Q, killactive,
bind = $mainMod, ESCAPE, exec, wlogout
bind = $mainMod, L, exec, hyprlock

# Screenshots (Verzeichnis wird automatisch erstellt)
bind = , Print, exec, mkdir -p ~/Pictures/Screenshots && grimblast --notify copysave area ~/Pictures/Screenshots/$(date +%F_%H-%M-%S).png
bind = SHIFT, Print, exec, grimblast --notify copysave screen ~/Pictures/Screenshots/$(date +%F_%H-%M-%S).png

# Navigation & Workspaces
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7

# Multimedia (SwayOSD)
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindel = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Maus-Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow